<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Esempio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>Esempio</h1>
    <div class="image-container">
      <img src="{{ url_for('static', filename='kid/' + sample_id|string + '.png') }}" alt="KID {{ sample_id }}" class="document-image">
    </div>
    <p class="intro">Quando sei pronto per iniziare, clicca AVANTI</p>
    <form method="post" action="{{ url_for('sample_kid_continue') }}">
      <div class="actions">
        <button type="submit" class="btn">Avanti</button>
      </div>
    </form>
  </div>
  <script>
    // Disable back button
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
    };

    // Prevent right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    // Prevent keyboard shortcuts for back navigation
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.keyCode === 37)) {
        e.preventDefault();
        alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
      }
    });
  </script>
</body>
</html>
