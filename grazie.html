<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Grazie' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>{{ title or 'Grazie' }}</h1>
    <p>{{ message or 'Le sue risposte sono state registrate correttamente.' }}</p>
  </div>
  <script>
    // Disable back button
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Il questionario è completato. Non è possibile tornare alle pagine precedenti.");
    };
    
    // Prevent right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
    
    // Prevent keyboard shortcuts for back navigation
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.keyCode === 37)) {
        e.preventDefault();
        alert("Il questionario è completato. Non è possibile tornare alle pagine precedenti.");
      }
    });
  </script>
</body>
</html>
