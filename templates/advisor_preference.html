<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ cfg["title"] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container narrow">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="alerts">
          {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('submit_advisor_preference') }}">
      <input type="hidden" id="response_time" name="response_time" value="0">

      <div class="question-block">
        <label class="question-label">{{ cfg["advisor_preference_phase"]["question_text"] }}</label>

        <div class="radio-group">
          {% for opt in cfg["advisor_preference_phase"]["options"] %}
            <label class="radio-row">
              <input type="radio" name="advisor_preference" value="{{ opt }}" required>
              <span class="radio-label">{{ opt }}</span>
            </label>
          {% endfor %}
        </div>
      </div>

      <div class="actions">
        <button type="submit" class="btn">{{ cfg["advisor_preference_phase"]["button_label"] }}</button>
      </div>
    </form>
  </div>

  <script>
    const startTime = Date.now();
    document.querySelector('form').addEventListener('submit', function() {
      const responseTime = Math.round((Date.now() - startTime) / 1000);
      document.getElementById('response_time').value = responseTime;
    });

    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Non è possibile tornare alle pagine precedenti.");
    };

    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.keyCode === 37)) {
        e.preventDefault();
        alert("Non è possibile tornare alle pagine precedenti.");
      }
    });
  </script>
</body>
</html>
