<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ cfg["title"] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container narrow">
    <div class="kid-card">
      <div class="kid-header">
        <h1>Preferenza consulente</h1>
      </div>

      <div class="question-box">
        <p class="question-text">{{ cfg["main_phase"]["advisor_preference_question"]["text"] }}</p>

        <form method="post" action="{{ url_for('submit_advisor_preference') }}">
          <input type="hidden" id="response_time" name="response_time" value="0">

          <div class="radio-group">
            {% for opt in cfg["main_phase"]["advisor_preference_question"]["options"] %}
              <label class="radio-row">
                <input type="radio" name="advisor_preference" value="{{ opt }}" required>
                <span class="radio-label">{{ opt }}</span>
              </label>
            {% endfor %}
          </div>

          <div class="actions">
            <button type="submit" class="btn">Concludi</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // Track response time
    const startTime = Date.now();
    document.querySelector('form').addEventListener('submit', function() {
      const responseTime = Math.round((Date.now() - startTime) / 1000);
      document.getElementById('response_time').value = responseTime;
    });

    // Disable back button
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Non è possibile tornare alle pagine precedenti.");
    };

    // Prevent right-click
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    // Prevent back shortcuts
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.keyCode === 37)) {
        e.preventDefault();
        alert("Non è possibile tornare alle pagine precedenti.");
      }
    });
  </script>
</body>
</html>
