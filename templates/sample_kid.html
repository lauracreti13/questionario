<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ cfg["title"] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="image-container">
  <img src="{{ url_for('static', filename='kid/' ~ sample_id ~ '.png') }}" alt="Documento esempio" class="document-image">
</div>

<p style="text-align:center; margin-top:10px; font-size:16px;">
  Quando sei pronto, clicca <strong>AVANTI</strong>
</p>

    <form method="post" action="{{ url_for('sample_kid_continue') }}">
      <div class="actions">
        <button type="submit" class="btn">Avanti</button>
      </div>
    </form>
  </div>

  <script>
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
    };

    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.keyCode === 37)) {
        e.preventDefault();
        alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
      }
    });
  </script>
</body>
</html>
