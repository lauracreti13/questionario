<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ cfg["title"] }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1>{{ cfg["title"] }}</h1>
    <section class="consent-box">
      <h2>{{ cfg["consent"]["title"] }}</h2>
      <p>{{ cfg["consent"]["text"]|safe }}</p>
    </section>

    <form method="post" action="{{ url_for('consent') }}">
      <div class="consent-actions">
        <button type="submit" name="decision" value="accept" class="btn">{{ cfg["consent"]["accept_label"] }}</button>
        <button type="submit" name="decision" value="deny" class="btn secondary">{{ cfg["consent"]["deny_label"] }}</button>
      </div>
    </form>
  </div>
  <script>
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
    };

    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'F12' ||
          (e.ctrlKey && e.shiftKey && ['I', 'C', 'J'].includes(e.key)) ||
          (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
