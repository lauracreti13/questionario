<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KID</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="image-container">
      <img src="{{ url_for('static', filename='kid/' + image_id|string + '.png') }}" alt="KID {{ image_id }}" class="document-image">
    </div>
    <form method="post" action="{{ url_for('image_next', image_id=image_id) }}">
      <input type="hidden" id="view_time" name="view_time" value="0">
      <div class="actions">
        <button type="submit" class="btn">Avanti</button>
      </div>
    </form>
  </div>
  <script>
    // Track image view time
    const imageLoadTime = Date.now();
    
    // Track form submission to capture view time
    document.querySelector('form').addEventListener('submit', function(e) {
      const viewTime = Math.round((Date.now() - imageLoadTime) / 1000);
      document.getElementById('view_time').value = viewTime;
    });
    
    let countdown = 120;
    const countdownEl = document.createElement('div');
    countdownEl.id = 'countdown-timer';
    countdownEl.style.position = 'fixed';
    countdownEl.style.top = '10px';
    countdownEl.style.right = '10px';
    countdownEl.style.background = '#000';
    countdownEl.style.color = '#fff';
    countdownEl.style.padding = '10px 15px';
    countdownEl.style.borderRadius = '5px';
    countdownEl.style.fontSize = '16px';
    countdownEl.style.fontWeight = 'bold';
    countdownEl.style.zIndex = '1000';
    document.body.appendChild(countdownEl);
    
    const timer = setInterval(() => {
      countdownEl.textContent = `Tempo rimanente: ${countdown}s`;
      countdown--;
      if (countdown < 0) {
        clearInterval(timer);
        // Update view_time before submitting
        const viewTime = Math.round((Date.now() - imageLoadTime) / 1000);
        document.getElementById('view_time').value = viewTime;
        document.querySelector('form').submit();
      }
    }, 1000);
    
    // Update immediately
    countdownEl.textContent = `Tempo rimanente: ${countdown}s`;
    
    // Disable back button
    history.pushState(null, null, location.href);
    window.onpopstate = function() {
      history.pushState(null, null, location.href);
      alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
    };
    
    // Prevent right-click context menu
    document.addEventListener('contextmenu', function(e) {
      e.preventDefault();
    });
    
    // Prevent keyboard shortcuts for back navigation
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && (e.key === 'ArrowLeft' || e.keyCode === 37)) {
        e.preventDefault();
        alert("Non è possibile tornare alle pagine precedenti. Continua con il questionario.");
      }
    });
  </script>
</body>
</html>
